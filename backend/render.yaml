services:
  - type: web
    name: civic-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.10
      - key: NODE_ENV
        value: production
      - key: API_TYPE
        value: fastapi
